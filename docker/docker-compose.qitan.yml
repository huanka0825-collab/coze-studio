services:
  coze-server:
    image: qitan-coze-studio-server:local
    build:
      context: ../
      dockerfile: backend/Dockerfile
    environment:
      MODEL_PROTOCOL_0: ${QITAN_LLM_PROTOCOL:-${QITAN_MODEL_TEXT_PROTOCOL:-${QITAN_MODEL_GATEWAY_PROTOCOL:-openai}}}
      MODEL_OPENCOZE_ID_0: ${MODEL_OPENCOZE_ID_0:-910001}
      MODEL_NAME_0: ${QITAN_LLM_NAME:-${QITAN_MODEL_TEXT_NAME:-${QITAN_MODEL_GATEWAY_NAME:-启探默认模型}}}
      MODEL_ID_0: ${QITAN_LLM_MODEL:-${QITAN_COZE_LLM_MODEL:-${QITAN_MODEL_TEXT_MODEL:-${QITAN_MODEL_AGENT:-${QITAN_MODEL_CHAT:-}}}}}
      MODEL_API_KEY_0: ${QITAN_LLM_API_KEY:-${QITAN_COZE_LLM_API_KEY:-${QITAN_MODEL_TEXT_API_KEY:-${QITAN_MODEL_GATEWAY_API_KEY:-}}}}
      MODEL_BASE_URL_0: ${QITAN_LLM_BASE_URL:-${QITAN_COZE_LLM_BASE_URL:-${QITAN_MODEL_TEXT_BASE_URL:-${QITAN_MODEL_GATEWAY_BASE_URL:-}}}}
      BUILTIN_CM_TYPE: ${QITAN_LLM_PROTOCOL:-${QITAN_MODEL_TEXT_PROTOCOL:-${QITAN_MODEL_GATEWAY_PROTOCOL:-openai}}}
      BUILTIN_CM_OPENAI_BASE_URL: ${QITAN_LLM_BASE_URL:-${QITAN_COZE_LLM_BASE_URL:-${QITAN_MODEL_TEXT_BASE_URL:-${QITAN_MODEL_GATEWAY_BASE_URL:-}}}}
      BUILTIN_CM_OPENAI_API_KEY: ${QITAN_LLM_API_KEY:-${QITAN_COZE_LLM_API_KEY:-${QITAN_MODEL_TEXT_API_KEY:-${QITAN_MODEL_GATEWAY_API_KEY:-}}}}
      BUILTIN_CM_OPENAI_MODEL: ${QITAN_LLM_MODEL:-${QITAN_COZE_LLM_MODEL:-${QITAN_MODEL_TEXT_MODEL:-${QITAN_MODEL_CHAT:-${QITAN_MODEL_AGENT:-}}}}}
      EMBEDDING_TYPE: ${QITAN_EMBEDDING_PROTOCOL:-${QITAN_MODEL_EMBEDDING_PROTOCOL:-ark}}
      OPENAI_EMBEDDING_BASE_URL: ${QITAN_EMBEDDING_BASE_URL:-${QITAN_MODEL_EMBEDDING_BASE_URL:-}}
      OPENAI_EMBEDDING_API_KEY: ${QITAN_EMBEDDING_API_KEY:-${QITAN_MODEL_EMBEDDING_API_KEY:-}}
      OPENAI_EMBEDDING_MODEL: ${QITAN_EMBEDDING_MODEL:-${QITAN_MODEL_EMBEDDING_MODEL:-${QITAN_MODEL_EMBEDDING:-}}}
      OPENAI_EMBEDDING_DIMS: ${QITAN_EMBEDDING_DIMS:-1024}

  coze-web:
    image: qitan-agent-studio-web:local
    build:
      context: ../frontend/apps/coze-studio
      dockerfile: ../../../docker/branding/qitan/Dockerfile
    container_name: qitan-agent-studio-web
    volumes:
      - ./branding/qitan/qitan-branding.js:/usr/share/nginx/html/qitan-branding.js:ro
